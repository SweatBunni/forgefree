<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForgefreeAI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-card">
          <div class="brand-mark">F</div>
          <div>
            <p class="eyebrow">Minecraft Java Studio</p>
            <h1>ForgefreeAI</h1>
            <p class="brand-copy">Codestral-powered chat, builds, and downloads for Minecraft Java projects.</p>
          </div>
        </div>

        <button id="new-chat-button" class="ghost-button wide-button" type="button">
          New Chat
        </button>

        <div class="sidebar-section">
          <div class="section-row">
            <h2>Past Chats</h2>
            <span id="chat-count" class="muted-pill">0</span>
          </div>
          <div id="chat-list" class="chat-list"></div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Render-safe Build Flow</p>
            <h2 id="chat-title">New Minecraft Project</h2>
          </div>

          <div class="topbar-actions">
            <button id="download-source-button" class="action-button" type="button">
              Download Source
            </button>
            <button id="build-jar-button" class="action-button primary-button" type="button">
              Download JAR
            </button>
          </div>
        </header>

        <section class="workspace-meta">
          <div class="meta-card">
            <span class="meta-label">Host</span>
            <strong id="host-label">Checking...</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">Model</span>
            <strong id="model-label">Codestral</strong>
          </div>
          <div class="meta-card status-card">
            <span class="meta-label">Status</span>
            <strong id="status-text">Ready.</strong>
          </div>
        </section>

        <section id="messages" class="messages"></section>

        <form id="composer-form" class="composer">
          <label class="composer-label" for="prompt-input">Describe the Minecraft Java project you want.</label>
          <textarea
            id="prompt-input"
            rows="5"
            placeholder="Example: Build a Fabric 1.21.1 mod that adds glowing crystal caves, custom ores, loot tables, textures, and a fully working Gradle project."
          ></textarea>

          <div class="composer-controls">
            <div class="control-group">
              <label for="loader-select">Loader</label>
              <select id="loader-select">
                <option value="auto">Auto detect</option>
                <option value="fabric">Fabric</option>
                <option value="forge">Forge</option>
                <option value="neoforge">NeoForge</option>
                <option value="paper">Paper</option>
                <option value="spigot">Spigot</option>
                <option value="bukkit">Bukkit</option>
                <option value="velocity">Velocity</option>
                <option value="datapack">Datapack</option>
                <option value="resource-pack">Resource Pack</option>
              </select>
            </div>

            <div class="control-group">
              <label for="version-input">Minecraft Version</label>
              <input id="version-input" type="text" list="minecraft-versions" placeholder="1.21.1" />
              <datalist id="minecraft-versions">
                <option value="1.21.1"></option>
                <option value="1.21.4"></option>
                <option value="1.21.5"></option>
                <option value="1.20.6"></option>
              </datalist>
            </div>

            <div class="control-group grow">
              <span class="helper-text">Press Enter to send. Use Shift+Enter for a new line.</span>
            </div>

            <button id="send-button" class="primary-button send-button" type="submit">
              Send
            </button>
          </div>
        </form>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
